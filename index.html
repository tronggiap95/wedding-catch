<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#fff0e6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Wedding Catch</title>
  </head>
  <body>
    <div id="boot-splash" class="boot-splash" aria-live="polite" aria-busy="true">
      <div class="boot-splash__glow"></div>
      <div class="boot-splash__hearts" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <p class="boot-splash__eyebrow">Wedding Catch</p>
      <h1 class="boot-splash__title">Trọng Giáp ♥ Minh Thy</h1>
      <p class="boot-splash__status" id="boot-splash-status">Đang tải game…</p>
      <div class="boot-splash__track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
        <div class="boot-splash__bar" id="boot-splash-bar"></div>
      </div>
      <p class="boot-splash__pct" id="boot-splash-pct">0%</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
